# ============================================================
# 开发环境配置 — MySQL 本地数据库
# 启动方式: mvn spring-boot:run (默认 profile=dev)
# ============================================================

spring.datasource.url=jdbc:mysql://localhost:3306/smart_home?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 开发环境自动建表
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 开发环境日志级别
logging.level.com.example.keshe=DEBUG
logging.level.org.hibernate.SQL=DEBUG
