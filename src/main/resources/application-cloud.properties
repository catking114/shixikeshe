# ============================================================
# 阿里云部署配置 — 阿里云 RDS MySQL
# 前提条件: 在阿里云开通 RDS MySQL 实例，配置好安全组
# 启动方式: java -jar app.jar --spring.profiles.active=cloud
# ============================================================

# ---- 阿里云 RDS 连接（请替换为你的实际 RDS 地址） ----
# 内网地址格式: rm-xxxxx.mysql.rds.aliyuncs.com
# 外网地址格式: rm-xxxxx.mysql.rds.aliyuncs.com
spring.datasource.url=jdbc:mysql://<your-rds-host>:3306/smart_home?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=60000
spring.datasource.username=<your-rds-username>
spring.datasource.password=<your-rds-password>
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- HikariCP 连接池（针对阿里云 RDS 优化） ----
# RDS 基础版建议最大连接数 20，高配版可调高
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
# 连接有效性检测（防止 RDS 主动断开空闲连接）
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# ---- 阿里云 RDS 建表策略（首次运行用 update，之后建议改为 validate） ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# H2 控制台关闭
spring.h2.console.enabled=false

# ---- 服务器配置（阿里云 ECS 部署适配） ----
server.port=8080
# 如果用 Nginx 反向代理，可设置为 X-Forwarded-* 头识别
server.forward-headers-strategy=native
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# ---- CORS（前后端分离部署到不同域名时需要） ----
# 阿里云部署时改为你的前端域名，如 https://your-frontend.com
app.cors.allowed-origins=*
app.cors.allow-credentials=false

# ---- 日志（阿里云环境） ----
logging.level.com.example.keshe=INFO
logging.level.org.hibernate.SQL=WARN
# 日志输出到文件（方便阿里云日志服务 SLS 采集）
logging.file.name=/var/log/smart-home/app.log
logging.file.max-size=50MB
logging.file.max-history=30
