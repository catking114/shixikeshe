# ============================================================
# 生产环境配置 — 本地 MySQL 数据库
# 前提条件: 安装 MySQL 5.7+ / 8.0+，创建 smart_home 库
# 启动方式: mvn spring-boot:run -Dspring-boot.run.profiles=prod
# ============================================================

spring.datasource.url=jdbc:mysql://localhost:3306/smart_home?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池（适合本地 MySQL）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# 生产环境自动建表（首次运行后建议改为 validate）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# H2 控制台关闭
spring.h2.console.enabled=false

# 生产环境日志
logging.level.com.example.keshe=INFO
logging.level.org.hibernate.SQL=WARN
