# ============================================================
# Smart Home 智能后台管理系统 — 主配置文件
# ============================================================
# 环境切换：修改 spring.profiles.active 即可
#   dev   — 本地开发（H2 内存数据库，无需安装 MySQL）
#   prod  — 生产环境（本地 MySQL）
#   cloud — 阿里云部署（阿里云 RDS MySQL + 连接池优化）
# ============================================================

spring.profiles.active=dev

# Disable static resource caching (dev only)
spring.web.resources.chain.cache=false
spring.web.resources.cache.cachecontrol.max-age=0

# ---- 服务器通用配置 ----
server.port=8080
server.servlet.context-path=/
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ---- JPA 通用配置 ----
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---- 涂鸦云 API 配置 ----
# 从 https://iot.tuya.com 获取凭证
tuya.access-id=
tuya.access-key=
tuya.api-base=https://openapi.tuyacn.com
tuya.uid=

# ---- Yeelight 局域网发现 ----
yeelight.discovery-timeout=5

# ---- CORS 配置（前后端分离时需要） ----
app.cors.allowed-origins=*
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=false

# ---- 文件上传限制 ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Actuator 健康检查与监控端点 ----
# /actuator/health 可供阿里云 SLB/ALB 做健康探测
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
